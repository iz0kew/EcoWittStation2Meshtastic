; ============================================================================
; Ricevitore meteo Fine Offset/Ecowitt (WH32 + WH40 + WH57) con bridge
; telemetria verso Meshtastic.
;
; Compilazione:
;   pio run -e heltec_v3 -t upload
;   pio run -e heltec_v4 -t upload
;   pio run -e wireless_tracker -t upload
;
; La configurazione utente sta in settings.ini: viene applicata in automatico
; ad ogni build dallo script tools/apply_settings.py
; ============================================================================

[platformio]
default_envs = heltec_v3

[env]
platform = espressif32
framework = arduino
monitor_speed = 115200
upload_speed = 921600
extra_scripts = pre:tools/apply_settings.py
lib_deps =
    jgromes/RadioLib @ ^7.1.2
    olikraus/U8g2 @ ^2.36.5
    rweather/Crypto @ ^0.4.0
    adafruit/Adafruit ST7735 and ST7789 Library @ ^1.10.4
    adafruit/Adafruit GFX Library @ ^1.11.11
    adafruit/Adafruit BusIO @ ^1.16.1

[env:heltec_v3]
board = heltec_wifi_lora_32_V3
build_flags = -D BOARD_HELTEC_V3

[env:heltec_v4]
; La V4 e' pin-compatibile con la V3 (stesso ESP32-S3 + SX1262 + OLED);
; finche' non esiste una board definition dedicata si usa quella della V3.
board = heltec_wifi_lora_32_V3
build_flags = -D BOARD_HELTEC_V4

[env:wireless_tracker]
board = heltec_wireless_tracker
build_flags = -D BOARD_WIRELESS_TRACKER
