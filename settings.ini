# ============================================================================
# settings.ini — configurazione del ricevitore meteo
# Modifica questo file e ricompila: lo script tools/apply_settings.py
# genera automaticamente include/user_config.h prima di ogni build.
# Compilazione: pio run -e heltec_v3 -t upload   (o heltec_v4 / wireless_tracker)
# ============================================================================

[meshtastic]
# Abilita l'invio dei dati sulla rete Meshtastic (true/false)
enabled = true

# Frequenza di trasmissione in MHz. Per la regione EU868 con preset a
# banda 250 kHz (LongFast, MediumFast, ...) lo slot di default e' 869.525
frequency_mhz = 869.525

# Preset modem LoRa. Valori ammessi:
#   ShortTurbo, ShortFast, ShortSlow, MediumFast, MediumSlow,
#   LongFast, LongModerate, LongSlow
# Il nome del preset e' anche il nome del canale di default (chiave pubblica)
preset = MediumFast

# Intervallo tra un invio di telemetria e il successivo, in minuti.
# Il valore inviato e' la MEDIA delle letture dall'invio precedente.
send_interval_min = 10

# Nome del nodo sulla rete Meshtastic
# short_name: massimo 4 caratteri
short_name = WX32
long_name = Stazione Meteo 

# Potenza TX in dBm (max 22 sul chip SX1262; sulla Heltec V4 il PA
# amplifica ulteriormente, tienine conto per i limiti di legge)
tx_power_dbm = 14

# Numero massimo di salti (hop) dei pacchetti sulla rete mesh (0-7).
# Il valore tipico di Meshtastic e' 3.
hop_limit = 3

# Posizione fissa della stazione, trasmessa periodicamente sulla rete
# (apparira' sulla mappa dell'app come per un nodo con GPS).
# Quota in metri sul livello del mare.
# Lascia latitude e longitude a 0 per NON trasmettere la posizione.
latitude = 41.9027
longitude = 12.4963
altitude_m = 21

# Invia anche un messaggio di testo sul canale quando il WH57 rileva
# nuovi fulmini (true/false)
lightning_text = true

[ricezione]
# Parametri FSK per i sensori Fine Offset / Ecowitt
freq_mhz = 868.35
bitrate_kbps = 17.24
freq_dev_khz = 60.0
rx_bw_khz = 234.3

[storico]
# Ogni quanti minuti viene presa una campionatura per i grafici (5 o 10)
sample_interval_min = 10
